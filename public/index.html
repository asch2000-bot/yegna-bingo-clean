<!DOCTYPE html>
<html>
<head>
    <title>Yegna Bingo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            padding: 16px;
            min-height: 100vh;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 20px; font-size: 1.8rem; }
        .balance-card {
            background: linear-gradient(135deg, #e94560, #0f3460);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            margin-bottom: 20px;
        }
        .balance-amount { font-size: 2rem; font-weight: bold; }
        button {
            background: #e94560;
            color: white;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin: 8px 0;
        }
        button:active { transform: scale(0.97); }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
        }
        .card-container {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
            margin-top: 20px;
        }
        .bingo-card {
            background: white;
            border-radius: 16px;
            padding: 12px;
            width: 280px;
        }
        .bingo-header {
            display: grid;
            grid-template-columns: repeat(5,1fr);
            text-align: center;
            margin-bottom: 8px;
            font-weight: bold;
            color: #e94560;
        }
        .bingo-grid {
            display: grid;
            grid-template-columns: repeat(5,1fr);
            gap: 4px;
        }
        .bingo-cell {
            background: #f0f0f0;
            border-radius: 8px;
            padding: 10px 4px;
            text-align: center;
            font-size: 0.85rem;
            font-weight: bold;
            color: #333;
        }
        .bingo-cell.marked {
            background: linear-gradient(135deg, #e94560, #0f3460);
            color: white;
        }
        .bingo-cell.free {
            background: #ffd200;
            color: #333;
        }
        .current-number {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 16px;
            text-align: center;
            margin-bottom: 20px;
        }
        .number-display {
            font-size: 3rem;
            font-weight: bold;
            color: #ffd200;
        }
        .players-list {
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
        }
        .player-item {
            background: rgba(255,255,255,0.1);
            padding: 8px 12px;
            margin: 6px 0;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
        }
        .bet-options {
            display: flex;
            gap: 10px;
            margin: 10px 0;
        }
        .bet-option {
            flex: 1;
            text-align: center;
            background: rgba(255,255,255,0.2);
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
        }
        .bet-option.selected { background: #e94560; }
        .status-msg {
            text-align: center;
            padding: 10px;
            margin: 10px 0;
            background: rgba(0,0,0,0.5);
            border-radius: 12px;
        }
        .countdown {
            font-size: 2rem;
            font-weight: bold;
            color: #ffd200;
            text-align: center;
            margin: 10px 0;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🎮 YEGNA BINGO</h1>
    <div class="balance-card">
        <div>💰 MY BALANCE</div>
        <div class="balance-amount" id="balanceAmount">0</div>
        <div>Birr</div>
    </div>

    <div id="loginSection">
        <input type="text" id="phoneNumber" placeholder="Phone (0912345678)">
        <input type="text" id="playerName" placeholder="Your name">
        <button onclick="register()">🔓 REGISTER / LOGIN</button>
        <div class="status-msg">✨ New users get 10 Birr welcome bonus!</div>
    </div>

    <div id="gameSection" style="display:none">
        <div class="current-number">
            <div>🎲 CURRENT NUMBER</div>
            <div class="number-display" id="currentNumber">-</div>
        </div>
        
        <div class="status-msg" id="gameStatus">⏳ Waiting for game to start...</div>
        <div class="countdown" id="countdown"></div>
        
        <div id="playSection">
            <div>Number of cards (1-3): <input type="number" id="numCards" min="1" max="3" value="1"></div>
            <div>Bet per card (Birr):</div>
            <div class="bet-options" id="betOptions">
                <div class="bet-option" data-bet="10">10</div>
                <div class="bet-option" data-bet="20">20</div>
                <div class="bet-option" data-bet="50">50</div>
                <div class="bet-option" data-bet="100">100</div>
            </div>
            <button onclick="playGame()">🎮 PLAY BINGO</button>
        </div>
        
        <div id="cardsContainer" class="card-container"></div>
        <div id="playersInfo"><h3>👥 Players in Game</h3><div class="players-list" id="playersList"></div></div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    let socket, currentUser = null, selectedBet = 10;
    let gameState = null;
    let countdownInterval = null;
    
    document.querySelectorAll('.bet-option').forEach(opt => {
        opt.onclick = () => {
            document.querySelectorAll('.bet-option').forEach(o=>o.classList.remove('selected'));
            opt.classList.add('selected');
            selectedBet = parseInt(opt.dataset.bet);
        };
        if(opt.dataset.bet == 10) opt.classList.add('selected');
    });

    async function register() {
        const phone = document.getElementById('phoneNumber').value.trim();
        const name = document.getElementById('playerName').value.trim();
        if(!phone || phone.length !== 10) return alert('Enter valid 10-digit phone number');
        if(!name) return alert('Enter your name');
        
        const res = await fetch('/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone, name })
        });
        const data = await res.json();
        if(data.success) {
            currentUser = { id: data.userId, name, phone, balance: data.balance };
            document.getElementById('balanceAmount').innerText = data.balance;
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('gameSection').style.display = 'block';
            if(data.welcomeBonus) alert('🎉 Welcome! You received 10 Birr bonus!');
            connectSocket();
            loadGameState();
        } else {
            alert('Registration failed');
        }
    }

    function connectSocket() {
        socket = io();
        
        socket.on('gameState', (game) => {
            gameState = game;
            updateUI(game);
        });
        
        socket.on('numberCalled', (data) => {
            document.getElementById('currentNumber').innerText = data.number;
            speakNumber(data.number);
        });
        
        socket.on('gameStarted', () => {
            document.getElementById('gameStatus').innerHTML = '🎲 GAME ACTIVE! Numbers are being called...';
            if(countdownInterval) clearInterval(countdownInterval);
            document.getElementById('countdown').innerHTML = '';
        });
        
        socket.on('gameEnded', (data) => {
            alert(`🎉 GAME OVER! Winner: ${data.winner} won ${data.prize} Birr! 🎉`);
            loadGameState();
        });
    }

    function speakNumber(number) {
        if ('speechSynthesis' in window) {
            const utterance = new SpeechSynthesisUtterance(number.toString());
            utterance.lang = 'am-ET';
            utterance.rate = 0.9;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }
    }

    async function playGame() {
        const numCards = parseInt(document.getElementById('numCards').value);
        if(numCards < 1 || numCards > 3) return alert('Cards must be 1-3');
        const betPerCard = selectedBet;
        
        const res = await fetch('/api/game/play', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                playerId: currentUser.id, 
                playerName: currentUser.name, 
                numCards, 
                betPerCard 
            })
        });
        const data = await res.json();
        
        if(data.success) {
            document.getElementById('balanceAmount').innerText = data.newBalance;
            document.getElementById('playSection').style.display = 'none';
            gameState = data.gameState;
            updateUI(gameState);
            
            if(data.waitingTime > 0) {
                startCountdown(data.waitingTime);
            }
        } else {
            alert(data.error);
        }
    }

    function startCountdown(seconds) {
        let timeLeft = seconds;
        if(countdownInterval) clearInterval(countdownInterval);
        countdownInterval = setInterval(() => {
            if(timeLeft <= 0) {
                clearInterval(countdownInterval);
                document.getElementById('countdown').innerHTML = '🚀 GAME STARTING NOW!';
            } else {
                document.getElementById('countdown').innerHTML = `⏰ Game starts in ${timeLeft} seconds`;
            }
            timeLeft--;
        }, 1000);
    }

    async function loadGameState() {
        const res = await fetch('/api/game/state');
        const state = await res.json();
        if(state && state.id) {
            gameState = state;
            updateUI(state);
            if(state.status === 'waiting' && state.createdAt) {
                const elapsed = Math.floor((Date.now() - state.createdAt) / 1000);
                const remaining = Math.max(0, 60 - elapsed);
                if(remaining > 0) startCountdown(remaining);
            }
        }
        socket.emit('joinGame');
    }

    function updateUI(game) {
        if(!game) return;
        
        const playersDiv = document.getElementById('playersList');
        playersDiv.innerHTML = game.players.map(p => `<div class="player-item">${p.name} (bet: ${p.totalBet} Birr) ${p.hasWon ? '🏆 WON' : ''}</div>`).join('');
        
        const myPlayer = game.players.find(p => p.id === currentUser?.id);
        if(myPlayer) {
            const container = document.getElementById('cardsContainer');
            container.innerHTML = '';
            myPlayer.cards.forEach((card, idx) => {
                const cardDiv = document.createElement('div');
                cardDiv.className = 'bingo-card';
                cardDiv.innerHTML = `<div class="bingo-header">${['B','I','N','G','O'].map(l=>`<div>${l}</div>`).join('')}</div><div class="bingo-grid" id="card-${idx}"></div>`;
                container.appendChild(cardDiv);
                const grid = cardDiv.querySelector(`.bingo-grid`);
                for(let i=0;i<5;i++) {
                    for(let j=0;j<5;j++) {
                        const cell = card[i][j];
                        const cellDiv = document.createElement('div');
                        cellDiv.className = 'bingo-cell' + (cell.marked ? ' marked' : '') + (cell.value === 'FREE' ? ' free' : '');
                        cellDiv.innerText = cell.value;
                        grid.appendChild(cellDiv);
                    }
                }
            });
            document.getElementById('playSection').style.display = 'none';
        } else {
            if(game.status === 'waiting') {
                document.getElementById('playSection').style.display = 'block';
            }
        }
        
        if(game.currentNumber) document.getElementById('currentNumber').innerText = game.currentNumber;
        
        if(game.status === 'active') {
            document.getElementById('gameStatus').innerHTML = '🎲 GAME ACTIVE! Numbers are being called...';
            if(countdownInterval) clearInterval(countdownInterval);
            document.getElementById('countdown').innerHTML = '';
        } else if(game.status === 'waiting') {
            document.getElementById('gameStatus').innerHTML = '⏳ Waiting for game to start...';
        } else if(game.status === 'finished') {
            document.getElementById('gameStatus').innerHTML = '🏆 Game finished! New game starting soon...';
        }
    }

    // Auto-refresh game state every 2 seconds
    setInterval(loadGameState, 2000);
</script>
</body>
</html>
