<!DOCTYPE html>
<html>
<head>
    <title>Yegna Bingo Admin</title>
    <style>
        body { font-family: Arial; background: #1a1a2e; color: white; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.2); }
        button { background: #4caf50; color: white; padding: 5px 10px; border: none; border-radius: 5px; cursor: pointer; }
        .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 20px; margin-bottom: 20px; }
        .stat-card { background: linear-gradient(135deg,#e94560,#0f3460); padding: 20px; border-radius: 10px; text-align: center; }
        .stat-number { font-size: 2em; font-weight: bold; }
        input, select { padding: 8px; margin: 5px; border-radius: 5px; border: none; }
    </style>
</head>
<body>
<div class="container">
    <h1>👑 Yegna Bingo Admin Panel</h1>
    <div class="stats" id="stats"></div>
    <div class="card"><h2>👥 Users</h2><table id="usersTable"><tr><th>Name</th><th>Phone</th><th>Balance</th><th>Games</th><th>Wins</th></tr></table></div>
    <div class="card"><h2>💰 Adjust Balance</h2><input type="text" id="userPhone" placeholder="Phone"><input type="number" id="amount" placeholder="Amount"><select id="action"><option value="add">Add</option><option value="deduct">Deduct</option></select><button onclick="adjustBalance()">Apply</button></div>
</div>
<script>
async function loadData(){
    const res=await fetch('/api/admin/data');
    const data=await res.json();
    document.getElementById('stats').innerHTML=`<div class="stat-card"><div class="stat-number">${data.totalUsers}</div>Users</div><div class="stat-card"><div class="stat-number">${data.totalBalance}</div>Total Balance</div><div class="stat-card"><div class="stat-number">${data.activeGames}</div>Active Games</div><div class="stat-card"><div class="stat-number">${data.waitingGames}</div>Waiting Games</div>`;
    const table=document.getElementById('usersTable');
    data.users.forEach(u=>{table.innerHTML+=`<tr><td>${u.name}</td><td>${u.phone}</td><td>${u.balance} Birr</td><td>${u.gamesPlayed}</td><td>${u.gamesWon}</td></tr>`;});
}
async function adjustBalance(){
    const phone=document.getElementById('userPhone').value;
    const amount=parseInt(document.getElementById('amount').value);
    const action=document.getElementById('action').value;
    const res=await fetch('/api/admin/adjust-balance',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone,amount,type:action})});
    if(res.ok){alert('Balance updated');location.reload();}
    else alert('Error');
}
loadData();
setInterval(loadData,5000);
</script>
</body>
</html>
